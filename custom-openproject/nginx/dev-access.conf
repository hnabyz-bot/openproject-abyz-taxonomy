map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_origin $dev_origin {
    default http://localhost:8087;
    '' '';
}

map $http_referer $dev_referer {
    default $http_referer;
    "~^https?://[^/]+(?<referer_path>/.*)$" http://localhost:8087$referer_path;
    "~^https?://[^/]+$" http://localhost:8087/;
    '' '';
}

server {
    listen 8087;

    location / {
        proxy_pass http://127.0.0.1:18087;
        proxy_http_version 1.1;

        # OpenProject has one canonical host, but the dev instance must be usable
        # through localhost, LAN, and Tailscale addresses. Keep upstream request
        # headers canonical for CSRF and API session checks, then rewrite absolute
        # links back to the host the browser actually used.
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host localhost:8087;
        proxy_set_header Origin $dev_origin;
        proxy_set_header Referer $dev_referer;
        proxy_set_header Sec-Fetch-Site same-origin;
        proxy_set_header X-Forwarded-Host localhost:8087;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 8087;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect http://localhost:8087/ http://$http_host/;
        sub_filter_once off;
        sub_filter_types text/css application/javascript application/json;
        sub_filter 'http://localhost:8087' 'http://$http_host';
        sub_filter 'https://localhost:8087' 'http://$http_host';
        proxy_read_timeout 120s;
    }
}

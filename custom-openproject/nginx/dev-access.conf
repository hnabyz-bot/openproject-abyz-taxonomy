map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_origin $dev_origin {
    default http://localhost:8087;
    '' '';
}

server {
    listen 8087;

    location / {
        proxy_pass http://127.0.0.1:18087;
        proxy_http_version 1.1;

        # OpenProject has one canonical host, but the dev instance must be usable
        # through localhost, LAN, and Tailscale addresses. Keep the upstream host
        # stable for CSRF/session checks and rewrite absolute links back to the
        # host the browser actually used.
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host localhost:8087;
        proxy_set_header Origin $dev_origin;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 8087;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect http://localhost:8087/ http://$http_host/;
        sub_filter_once off;
        sub_filter_types text/css application/javascript application/json;
        sub_filter 'http://localhost:8087' 'http://$http_host';
        sub_filter 'https://localhost:8087' 'http://$http_host';
        proxy_read_timeout 120s;
    }
}

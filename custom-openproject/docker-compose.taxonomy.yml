services:
  openproject-taxonomy:
    image: openproject-abyz-taxonomy:17.5.0-0.2.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:18087:80"
    environment:
      - OPENPROJECT_SECRET_KEY_BASE=${OPENPROJECT_SECRET_KEY_BASE}
      - SECRET_KEY_BASE=${OPENPROJECT_SECRET_KEY_BASE}
      - OPENPROJECT_HOST__NAME=localhost:8087
      - OPENPROJECT_HTTPS=false
      - OPENPROJECT_DEFAULT__LANGUAGE=ko
      - OPENPROJECT_LOG__LEVEL=warn
      - OPENPROJECT_WEB__WORKERS=1
      - OPENPROJECT_WEB__MIN__THREADS=1
      - OPENPROJECT_WEB__MAX__THREADS=1
      - ABYZ_TAXONOMY_ASSET_VERSION=0.2.8
    volumes:
      - op_taxonomy_pgdata17:/var/openproject/pgdata
      - op_taxonomy_assets:/var/openproject/assets

volumes:
  op_taxonomy_pgdata17:
  op_taxonomy_assets:
